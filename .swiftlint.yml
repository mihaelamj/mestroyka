# Mechanical enforcement of the code rules a machine can decide
# (engineering.md principle: no force-unwrap in shipping code).
#
# Inert until Swift sources exist. The CI workflow that runs swiftlint plus
# build plus test ships with the engine package.
excluded:
  - "*.generated"
  - ".build/**"
  - "Packages/.build/**" # build artifacts and dependencies
  - "Packages/.xcode-dd/**" # xcodebuild derived data (dependency sources)
  - "Packages/DerivedData/**" # xcodebuild default derived data
  - "Packages/.swiftpm/**"
  - "Packages/Tests/**" # tests may use force unwrapping
opt_in_rules:
  - force_unwrapping
force_unwrapping: error
force_try: error
force_cast: error
# House style is always-trailing-commas (enforced by swiftformat); make
# swiftlint require them too instead of forbidding them.
trailing_comma:
  mandatory_comma: true
# Namespacing nests types under a root enum (Mestroyka.ToolCallRepair.Call),
# so allow deeper nesting than the default of 1.
nesting:
  type_level:
    warning: 3
    error: 3
  function_level:
    warning: 5
    error: 5
# State machines (e.g. a balanced-brace scanner) are legitimately branchy; the
# default of 10 is too strict. Match the house setting.
cyclomatic_complexity:
  ignores_case_statements: true
  warning: 20
  error: 20
# Match the house width (swiftformat --maxwidth 180).
line_length:
  warning: 180
  error: 180
  ignores_comments: true
  ignores_urls: true
